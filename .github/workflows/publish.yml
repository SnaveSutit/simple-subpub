name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Validate release tag matches package version
        if: ${{ github.event_name == 'release' }}
        run: |
          set -euo pipefail

          VERSION="$(bun -e "import pkg from './package.json'; console.log(pkg.version)")"

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${GITHUB_REF_NAME:-}"
          fi

          if [ -z "$TAG" ]; then
            echo "Unable to determine tag name for publish validation."
            exit 1
          fi

          if [ "$TAG" != "$VERSION" ] && [ "$TAG" != "v$VERSION" ]; then
            echo "Tag '$TAG' does not match package version '$VERSION'."
            exit 1
          fi

          echo "Tag/version validation passed: $TAG -> $VERSION"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Publish package
        if: ${{ github.event_name == 'release' }}
        run: npm publish --provenance --access public
