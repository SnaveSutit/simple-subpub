name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Validate release tag matches package version
        if: ${{ github.event_name == 'release' }}
        run: |
          set -euo pipefail

          VERSION="$(bun -e "import pkg from './package.json'; console.log(pkg.version)")"

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${GITHUB_REF_NAME:-}"
          fi

          if [ -z "$TAG" ]; then
            echo "Unable to determine tag name for publish validation."
            exit 1
          fi

          if [ "$TAG" != "$VERSION" ] && [ "$TAG" != "v$VERSION" ]; then
            echo "Tag '$TAG' does not match package version '$VERSION'."
            exit 1
          fi

          echo "Tag/version validation passed: $TAG -> $VERSION"

      - name: Verify OIDC token availability for npm trusted publishing
        if: ${{ github.event_name == 'release' }}
        run: |
          set -euo pipefail

          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "GitHub OIDC token request context is not available."
            echo "Ensure workflow/job permissions include: id-token: write"
            exit 1
          fi

          curl -fsS -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org" >/dev/null

      - name: Publish package
        if: ${{ github.event_name == 'release' }}
        run: npm publish --provenance --access public
